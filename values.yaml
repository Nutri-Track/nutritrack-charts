global:
  appName: nutritrack
  namespace: nutritrack-dev
  domain: dev.nutritrack360.in
  imagePullSecrets: []
gateway:
  name: nutritrack-gateway
  namespace: nutritrack-dev
  gatewayClassName: kgateway
  listener:
    name: http
    port: 80
postgresql:
  name: postgresql
  secretName: postgresql-secret
  primaryHost: postgresql-0.postgresql
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  persistence:
    enabled: true
    storageClass: mongo-nfs-storage
    accessModes:
      - ReadWriteOnce
    size: "10Gi"
  networkPolicy:
    enabled: true
    allowedPodLabels:
      - app: auth-service
      - app: food-service
      - app: macro-service
      - app: compliance-service
  auth:
    username: postgres
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
authService:
  name: auth-service
  secretName: auth-service-secret
  routePrefix: /api/auth
  healthPath: /api/auth/health
  image:
    repository: nutritrack360/nutritrack-auth-service
    tag: dev-c0db5e99f80985dd14e5dde3c901056e5df3b118
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  database:
    name: auth_db
    username: auth_user
  migration:
    enabled: true
    command: ["sh", "-c", "alembic upgrade head"]
foodService:
  name: food-service
  secretName: food-service-secret
  routePrefix: /api/food
  healthPath: /api/food/health
  image:
    repository: nutritrack360/nutritrack-food-service
    tag: dev-e645fcfe2e2013d4f76a920e95317d748a051e79
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8001
  database:
    name: food_db
    username: food_user
  migration:
    enabled: true
    command: ["sh", "-c", "alembic upgrade head"]
macroService:
  name: macro-service
  secretName: macro-service-secret
  routePrefix: /api/macro
  healthPath: /api/macro/health
  image:
    repository: nutritrack360/nutritrack-macro-service
    tag: dev-a90d0cd108e576c109ff1de982dbe9a33896f41e
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8002
  database:
    name: macro_db
    username: macro_user
  migration:
    enabled: true
    command: ["sh", "-c", "alembic upgrade head"]
complianceService:
  name: compliance-service
  secretName: compliance-service-secret
  routePrefix: /api/compliance
  healthPath: /api/compliance/health
  image:
    repository: nutritrack360/nutritrack-compliance-service
    tag: dev-ee7557715d24a9c054c639bc4449bd0627d3db05
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8003
  database:
    name: compliance_db
    username: compliance_user
  migration:
    enabled: true
    command: ["sh", "-c", "alembic upgrade head"]
  thresholds:
    proteinDeficiencyPct: "80"
    calorieSurplusPct: "120"
    calorieDeficitPct: "70"
    patternDays: "3"
frontend:
  name: frontend
  routePrefix: /
  image:
    repository: nutritrack360/nutritrack-frontend
    tag: dev-549dfe59e4b011b42718756f45f74b74e6185812
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  apiBaseUrl: ""
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 70
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
