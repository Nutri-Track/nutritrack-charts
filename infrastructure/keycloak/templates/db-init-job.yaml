apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-db-init
  # We run this in nutritrack-dev so it can access the postgresql-secret
  namespace: nutritrack-dev 
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: PGHOST
              value: postgresql-0.postgresql.nutritrack-dev.svc.cluster.local
            - name: KC_DB_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: KC_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              echo "Initializing Keycloak Database..."
              
              # Check if role exists, if not create it
              psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$KC_DB_USER';" | grep -q 1 || \
              psql -c "CREATE USER $KC_DB_USER WITH PASSWORD '$KC_DB_PASS';"
              
              # Check if DB exists, if not create it
              psql -tc "SELECT 1 FROM pg_database WHERE datname='keycloak_db';" | grep -q 1 || \
              psql -c "CREATE DATABASE keycloak_db OWNER $KC_DB_USER;"
              
              # Grant privileges
              psql -c "GRANT ALL PRIVILEGES ON DATABASE keycloak_db TO $KC_DB_USER;"
              
              echo "Database initialization complete!"
