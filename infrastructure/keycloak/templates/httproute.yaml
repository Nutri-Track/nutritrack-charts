apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
    - name: nutritrack-gateway
      namespace: nutritrack-dev
  hostnames:
    - "keycloak.dev.nutritrack360.in"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 8080
