apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: nutritrack-realm
  namespace: keycloak
spec:
  keycloakCRName: nutritrack-keycloak
  realm:
    id: nutritrack
    realm: nutritrack
    enabled: true
    displayName: "NutriTrack SSO"
    
    # ── Roles ───────────────────────────────────────────
    roles:
      realm:
        - name: admin
        - name: developer
        - name: viewer

    # ── Users ───────────────────────────────────────────
    users:
      - username: nutritrack-admin
        enabled: true
        email: admin@nutritrack360.in
        firstName: Admin
        lastName: User
        emailVerified: true
        credentials:
          - type: password
            value: "admin123"
            temporary: false
        realmRoles:
          - admin

    # ── Clients (OIDC Integration) ──────────────────────
    clients:
      - clientId: headlamp
        name: Headlamp Kubernetes Dashboard
        enabled: true
        clientAuthenticatorType: client-secret
        secret: "headlamp-oidc-secure-secret-2026"
        redirectUris:
          - "http://headlamp.dev.nutritrack360.in/*"
        webOrigins:
          - "http://headlamp.dev.nutritrack360.in"
        standardFlowEnabled: true
        implicitFlowEnabled: false
        directAccessGrantsEnabled: true
        publicClient: false
        protocol: openid-connect
        fullScopeAllowed: true
