{{/*
  ┌─────────────────────────────────────────────────────────────────────┐
  │ IMPORTANT: This is a PLACEHOLDER SealedSecret template.           │
  │                                                                   │
  │ You MUST generate the real encrypted data using kubeseal:          │
  │                                                                   │
  │   kubeseal --format yaml \                                        │
  │     --controller-name sealed-secrets-controller \                  │
  │     --controller-namespace kube-system \                           │
  │     < keycloak-secret.yaml > keycloak-sealed-secret.yaml           │
  │                                                                   │
  │ Required keys in the source Secret:                               │
  │   - KEYCLOAK_ADMIN_USERNAME                                       │
  │   - KEYCLOAK_ADMIN_PASSWORD                                       │
  └─────────────────────────────────────────────────────────────────────┘
*/}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.keycloak.secretName }}
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    app: {{ .Values.keycloak.name }}
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
spec:
  encryptedData:
    KEYCLOAK_ADMIN_USERNAME: "<SEALED_VALUE>"
    KEYCLOAK_ADMIN_PASSWORD: "<SEALED_VALUE>"
  template:
    metadata:
      name: {{ .Values.keycloak.secretName }}
      namespace: {{ .Values.keycloak.namespace }}
      labels:
        app: {{ .Values.keycloak.name }}
        app.kubernetes.io/part-of: {{ .Values.global.appName }}
    type: Opaque
