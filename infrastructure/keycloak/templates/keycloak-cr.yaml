apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: nutritrack-keycloak
  namespace: nutritrack-dev
  labels:
    app: keycloak
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgresql.nutritrack-dev.svc.cluster.local
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
    database: keycloak_db
  http:
    httpEnabled: true
  hostname:
    hostname: keycloak.dev.nutritrack360.in
    strict: false
  proxy:
    headers: xforwarded
  additionalOptions:
    - name: spi-sticky-session-encoder-infinispan-should-attach-route
      value: "false"
  unsupported:
    podTemplate:
      spec:
        containers:
          - env:
              - name: KC_HOSTNAME_URL
                value: "http://keycloak.dev.nutritrack360.in"
              - name: KC_HOSTNAME_ADMIN_URL
                value: "http://keycloak.dev.nutritrack360.in"
  ingress:
    enabled: false
