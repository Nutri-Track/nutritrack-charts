apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: {{ .Values.headlamp.namespace }}
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - "{{ .Values.headlamp.hostname }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.headlamp.name }}
      port: {{ .Values.headlamp.port }}
