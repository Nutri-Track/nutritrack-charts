apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  namespace: {{ .Values.headlamp.namespace }}
  labels:
    app: headlamp
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-cluster-admin
  labels:
    app: headlamp
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: {{ .Values.global.appName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: {{ .Values.headlamp.namespace }}
