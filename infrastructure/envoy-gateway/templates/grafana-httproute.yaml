apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - "grafana.dev.nutritrack360.in"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: nutritrack-monitoring-grafana
      port: 80
