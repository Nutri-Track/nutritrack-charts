apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: security
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - name: nutritrack-gateway
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - "keycloak.dev.nutritrack360.in"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: nutritrack-keycloak
      port: 80
