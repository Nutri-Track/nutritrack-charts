apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - name: nutritrack-gateway
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - "argocd.nutritrack360.in"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd-server
      port: 80
