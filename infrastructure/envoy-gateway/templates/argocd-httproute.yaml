apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: nutritrack-gateway
    namespace: {{ .Values.global.namespace }}
  hostnames:
  - "argocd.dev.nutritrack360.in"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
