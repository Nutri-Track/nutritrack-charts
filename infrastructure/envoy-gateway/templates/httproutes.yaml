apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nutritrack-apis
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - name: nutritrack-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  rules:
  
  # ── Auth Service ──────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - name: auth-service
      port: 8000

  # ── Food Service ──────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/food
    backendRefs:
    - name: food-service
      port: 8001

  # ── Macro Service ─────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/macro
    backendRefs:
    - name: macro-service
      port: 8002

  # ── Compliance Service ────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/compliance
    backendRefs:
    - name: compliance-service
      port: 8003

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nutritrack-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - name: nutritrack-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  rules:
  
  # ── Frontend (Fallback / Root) ───────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 3000
