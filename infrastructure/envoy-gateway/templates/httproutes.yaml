apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nutritrack-apis
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: nutritrack-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  rules:
  
  # ── Auth Service ──────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - group: ""
      kind: Service
      name: auth-service
      port: 8000
      weight: 1

  # ── Food Service ──────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/food
    backendRefs:
    - group: ""
      kind: Service
      name: food-service
      port: 8001
      weight: 1

  # ── Macro Service ─────────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/macro
    backendRefs:
    - group: ""
      kind: Service
      name: macro-service
      port: 8002
      weight: 1

  # ── Compliance Service ────────────────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api/compliance
    backendRefs:
    - group: ""
      kind: Service
      name: compliance-service
      port: 8003
      weight: 1

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nutritrack-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: nutritrack
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: nutritrack-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  rules:
  
  # ── Frontend (Fallback / Root) ───────────────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: frontend
      port: 3000
      weight: 1
