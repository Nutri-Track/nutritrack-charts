apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nutritrack-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: nutritrack
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 72.6.2
    helm:
      values: |
        # ── Grafana ─────────────────────────────────────────────────
        grafana:
          adminPassword: nutritrack-admin
          persistence:
            enabled: true
            storageClassName: mongo-nfs-storage
            size: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Use sidecar to inject dashboards and Loki datasource
          sidecar:
            dashboards:
              enabled: true
            datasources:
              enabled: true
              label: grafana_datasource
              labelValue: "1"
              searchNamespace: ALL
        # We will create the ConfigMap separately for better reliability

        # ── Prometheus ──────────────────────────────────────────────
        prometheus:
          prometheusSpec:
            retention: 3d
            retentionSize: "4GB"
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: mongo-nfs-storage
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # ── Alertmanager ────────────────────────────────────────────
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
              # Read the webhook from the mounted secret file
              slack_api_url_file: /etc/alertmanager/secrets/slack-webhook/url
            route:
              group_by: ['alertname', 'severity', 'job']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'slack-notifications'
              routes:
                - match:
                    severity: critical
                  receiver: 'slack-notifications'
            receivers:
              - name: 'slack-notifications'
                slack_configs:
                  - channel: '#alerts'
                    send_resolved: true
                    icon_emoji: ':fire:'
                    title: '{{ template "slack.default.title" . }}'
                    text: >-
                      {{ range .Alerts -}}
                      *Alert:* {{ .Annotations.title }}{{ if .Labels.severity }} - `{{ .Labels.severity }}`{{ end }}
                      *Description:* {{ .Annotations.description }}
                      *Details:*
                        {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                        {{ end }}
                      {{ end }}
          alertmanagerSpec:
            retention: 72h
            # Mount the SealedSecret as a file
            secrets:
              - slack-webhook
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

        # ── Node Exporter ───────────────────────────────────────────
        nodeExporter:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        # ── Kube State Metrics ──────────────────────────────────────
        kubeStateMetrics:
          enabled: true

        # ── Disable components not needed on test cluster ───────────
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
