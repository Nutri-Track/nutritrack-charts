apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nutritrack-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: nutritrack
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.30.1
    helm:
      values: |
        # ── Single Binary mode (simplest, ideal for test) ──────────
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 72h        # 3 days retention

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: mongo-nfs-storage
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

        # ── Disable distributed components ──────────────────────────
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        # ── Disable caches (not needed for test) ───────────────────
        gateway:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
